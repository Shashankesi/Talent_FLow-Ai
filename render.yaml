services:
  - type: web
    name: talentflow-backend
    env: java
    region: oregon
    plan: free
    buildCommand: "cd backend && ./mvnw clean package -DskipTests"
    startCommand: "java -Dserver.port=$PORT -jar target/talentflow-api-*.jar"
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        scope: run
        value: mongodb+srv://REDACTED@REDACTED_CLUSTER.mrrc1c2.mongodb.net/talentflow?retryWrites=true&w=majority&authSource=admin
      - key: JWT_SECRET
        scope: run
        value: REDACTED_JWT_SECRET-production-minimum-32-characters-required-for-hs256
      - key: CORS_ORIGINS
        scope: run
        value: https://talentflow-frontend.onrender.com,http://localhost:3000,http://localhost:3001

  - type: static_site
    name: talentflow-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - path: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        scope: build
        value: https://talentflow-backend.onrender.com/api
