services:
  - type: web
    name: talentflow-backend
    env: java
    region: oregon
    plan: free
    buildCommand: "cd backend && ./mvnw clean package -DskipTests"
    startCommand: "java -Dserver.port=$PORT -jar target/talentflow-api-*.jar"
    healthCheckPath: /api/health
    envVars:
      # ⚠️ IMPORTANT: Set these in Render Dashboard (NOT in git)
      - key: SPRING_DATA_MONGODB_URI
        scope: run
        # Get from MongoDB Atlas: mongodb+srv://user:pass@cluster/db
      
      - key: JWT_SECRET
        scope: run
        # Generate: openssl rand -base64 32
      
      - key: CORS_ORIGINS
        scope: run
        # Set to: https://talentflow-frontend.onrender.com

  - type: static_site
    name: talentflow-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - path: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        scope: build
        # Set to: https://talentflow-backend.onrender.com/api
