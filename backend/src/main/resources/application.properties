spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/backend/.env[.properties],optional:file:.env[.properties],optional:file:../.env[.properties]

spring.application.name=talentflow-api
server.port=${PORT:${SERVER_PORT:8000}}
server.address=0.0.0.0

# MongoDB Configuration - REQUIRED: Set via environment variable
# Example: export SPRING_DATA_MONGODB_URI="mongodb+srv://user:pass@cluster.mongodb.net/db"
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI}}
spring.data.mongodb.database=talentflow

# JWT Configuration - REQUIRED: Set via environment variable
# Example: export JWT_SECRET="your-min-32-char-secret-key"
jwt.algorithm=HS256
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:${JWT_EXPIRATION:3600000}}
jwt.refresh-token.expiration=604800000
jwt.issuer=TalentFlow-AI
jwt.audience=TalentFlow-Client

# Password Encoding
password.encoder=bcrypt
password.strength=10

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=WARN
logging.level.com.talentflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# CORS Configuration - Set via environment variable for production
# Example: export CORS_ORIGINS="http://localhost:3000,https://frontend.onrender.com"
cors.allowed-origins=${CORS_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
cors.allowed-headers=*,Authorization,Content-Type
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
cors.max-age=3600

# Spring Security
spring.security.require-https=false

# Connection Pool
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.connection-timeout=5000

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false


