spring.application.name=talentflow-api
server.port=${PORT:8081}

# MongoDB Configuration - Uses environment variables
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://REDACTED@REDACTED_CLUSTER.mrrc1c2.mongodb.net/talentflow?retryWrites=true&w=majority&authSource=admin}
spring.data.mongodb.database=talentflow

# JWT Configuration - HS256 (Secure & Reliable)
jwt.algorithm=HS256
jwt.secret=${JWT_SECRET:REDACTED_JWT_SECRET-production-minimum-32-characters-required-for-hs256}
jwt.access-token.expiration=3600000
jwt.refresh-token.expiration=604800000
jwt.issuer=TalentFlow-AI
jwt.audience=TalentFlow-Client

# Password Encoding
password.encoder=bcrypt
password.strength=10

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=WARN
logging.level.com.talentflow=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# CORS Configuration - Updated for Render deployment
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*,Authorization,Content-Type
cors.allow-credentials=true
cors.max-age=3600

# Spring Security
spring.security.require-https=false

# Connection Pool
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.connection-timeout=5000

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false


